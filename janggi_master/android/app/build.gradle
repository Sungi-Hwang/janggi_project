plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def googleSampleAdMobPublisherId = "ca-app-pub-3940256099942544"
def googleSampleAdMobAppId = "${googleSampleAdMobPublisherId}~3347511713"
def productionAdMobAppId = "ca-app-pub-5593224479644015~7853283941"
def productionAndroidBannerAdUnitId = "ca-app-pub-5593224479644015/3813684745"
def productionAndroidInterstitialAdUnitId = "ca-app-pub-5593224479644015/6990601711"

def dartDefines = [:]
if (project.hasProperty("dart-defines")) {
    project.property("dart-defines").split(",").each { encodedDefine ->
        if (!encodedDefine.trim().isEmpty()) {
            def decodedDefine = new String(encodedDefine.decodeBase64(), "UTF-8")
            def parts = decodedDefine.split("=", 2)
            if (parts.length == 2) {
                dartDefines[parts[0]] = parts[1]
            }
        }
    }
}

def configuredAdMobAppId = (
    project.findProperty("ADMOB_APP_ID")
        ?: System.getenv("ADMOB_APP_ID")
        ?: dartDefines["ADMOB_APP_ID"]
        ?: productionAdMobAppId
).toString().trim()

def effectiveAdMobAppId = configuredAdMobAppId ?: productionAdMobAppId

def isGoogleSampleAdId = { value ->
    value != null && value.toString().contains(googleSampleAdMobPublisherId)
}

android {
    namespace = "com.nightsynclabs.janggihansu"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.nightsynclabs.janggihansu"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        manifestPlaceholders += [
            admobAppId: effectiveAdMobAppId
        ]

        externalNativeBuild {
            cmake {
                // Compile for C++17. IS_64BIT is now handled in CMakeLists.txt
                cppFlags "-std=c++17 -O3 -DNDEBUG -DUSE_POPCNT -DNNUE_EMBEDDING_OFF"
            }
        }

        // Restrict to 64-bit ABIs because we are building with -DIS_64BIT
        ndk {
            abiFilters 'arm64-v8a', 'x86_64'
        }
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
                storeFile keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
        }
    }

    externalNativeBuild {
        cmake {
            // Path to CMakeLists.txt relative to this build.gradle (android/app/build.gradle)
            path "../../engine/CMakeLists.txt"
        }
    }
}

flutter {
    source = "../.."
}

gradle.taskGraph.whenReady { taskGraph ->
    def isReleaseBuild = taskGraph.allTasks.any { task ->
        task.name.toLowerCase().contains("release")
    }
    if (!isReleaseBuild) {
        return
    }

    def missing = []
    if (configuredAdMobAppId.isEmpty() || isGoogleSampleAdId(configuredAdMobAppId)) {
        missing << "ADMOB_APP_ID"
    }

    [
        "SUPABASE_URL",
        "SUPABASE_ANON_KEY",
        "GOOGLE_WEB_CLIENT_ID",
    ].each { key ->
        def value = (dartDefines[key] ?: "").toString().trim()
        if (value.isEmpty()) {
            missing << key
        }
    }

    [
        "ADMOB_ANDROID_BANNER_ID": productionAndroidBannerAdUnitId,
        "ADMOB_ANDROID_INTERSTITIAL_ID": productionAndroidInterstitialAdUnitId,
    ].each { key, productionDefault ->
        def value = (dartDefines[key] ?: productionDefault).toString().trim()
        if (value.isEmpty() || isGoogleSampleAdId(value)) {
            missing << key
        }
    }

    if (!missing.isEmpty()) {
        throw new GradleException(
            "Release builds require production config values: ${missing.join(', ')}. " +
            "Pass them with --dart-define."
        )
    }
}
